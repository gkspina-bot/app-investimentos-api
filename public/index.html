<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Registro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #007bff, #0056b3);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 123, 255, 0.3);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }

        .toggle {
            display: flex;
            background: #f8f9fa;
        }

        .toggle-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 600;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: #007bff;
            color: white;
        }

        .form {
            display: none;
            padding: 40px 30px;
            text-align: center;
        }

        .form.active {
            display: block;
        }

        .form h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form input:focus {
            outline: none;
            border-color: #007bff;
        }

        .form button {
            width: 100%;
            padding: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .form button:hover {
            background: #0056b3;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-weight: 500;
            display: none;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        @media (max-width: 480px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toggle">
            <button id="loginToggle" class="toggle-btn active">Entrar</button>
            <button id="registerToggle" class="toggle-btn">Registrar</button>
        </div>
        <div id="loginForm" class="form active">
            <h2>Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginSenha" placeholder="Senha" required>
            <button id="loginBtn">Entrar</button>
            <div id="loginMessage" class="message"></div>
        </div>
        <div id="registerForm" class="form">
            <h2>Registro</h2>
            <input type="email" id="registerEmail" placeholder="Email" required>
            <input type="password" id="registerSenha" placeholder="Senha" minlength="6" required>
            <button id="registerBtn">Registrar</button>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <script>
        const loginToggle = document.getElementById('loginToggle');
        const registerToggle = document.getElementById('registerToggle');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        loginToggle.addEventListener('click', () => {
            loginToggle.classList.add('active');
            registerToggle.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
            clearMessage('loginMessage');
        });

        registerToggle.addEventListener('click', () => {
            registerToggle.classList.add('active');
            loginToggle.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
            clearMessage('registerMessage');
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const senha = document.getElementById('loginSenha').value;
            const messageDiv = document.getElementById('loginMessage');

            if (!email || !senha) {
                showMessage(messageDiv, 'Preencha todos os campos.', 'error');
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: email, password: senha })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user_id', data.user.id);
                    window.location.href = '/dashboard.html';
                } else {
                    showMessage(messageDiv, data.error || 'Erro no login.', 'error');
                }
            } catch (error) {
                showMessage(messageDiv, 'Erro de conexão. Tente novamente.', 'error');
            }
        });

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const email = document.getElementById('registerEmail').value.trim();
            const senha = document.getElementById('registerSenha').value;
            const messageDiv = document.getElementById('registerMessage');

            if (!email || senha.length < 6) {
                showMessage(messageDiv, 'Senha deve ter pelo menos 6 caracteres.', 'error');
                return;
            }

            try {
                const response = await fetch('/api/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: email, password: senha })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(messageDiv, 'Registro realizado com sucesso!', 'success');
                    // Limpa campos após sucesso
                    document.getElementById('registerEmail').value = '';
                    document.getElementById('registerSenha').value = '';
                } else {
                    showMessage(messageDiv, data.error || 'Erro no registro.', 'error');
                }
            } catch (error) {
                showMessage(messageDiv, 'Erro de conexão. Tente novamente.', 'error');
            }
        });

        function showMessage(div, text, type) {
            clearMessage(div);
            div.textContent = text;
            div.className = `message ${type}`;
            div.style.display = 'block';
        }

        function clearMessage(divId) {
            const div = typeof divId === 'string' ? document.getElementById(divId) : divId;
            div.textContent = '';
            div.style.display = 'none';
        }
    </script>
</body>
</html>
